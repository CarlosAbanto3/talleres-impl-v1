# Lista de todas las functions
vehicular:
  handler: src/siniestro/controller/App.handler
  events:
    - http:
        path: /siniestros
        method: get
        integration: lambda
        authorizer: ${self:custom.authorizer}
        cors:
          ${file(config/serverless/http-cors.yaml)}
        request:
          parameters:
            querystrings:
              tipo: true
              valor: true
          template:
            application/json: ${file(config/serverless/request/buscarSiniestro.vm)}
        response:
          ${file(config/serverless/http-response.yaml)}
